apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: check-required-labels
    match:
      any:
      - resources:
          kinds: [Deployment, DaemonSet, StatefulSet]
          namespaces: [apps]
    validate:
      message: "Deployments must have app, team, and env labels on the pod template."
      pattern:
        spec:
          template:
            metadata:
              labels:
                app: "?*"
                team: "?*"
                env: "?*"
