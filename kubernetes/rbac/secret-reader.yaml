apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: apps
  name: secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-secrets-binding
  namespace: apps
subjects:
- kind: ServiceAccount
  name: frontend-sa
  namespace: apps
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io